name: hamzapost
description: >-
  A Flutter news aggregator for Moroccan headlines sourced from curated Google News RSS feeds.
publish_to: 'none'
version: 1.0.0+1
environment:
  sdk: '>=2.19.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.6
  dart_rss: ^2.0.0
  shared_preferences: ^2.0.15
  provider: ^6.0.5
  intl: ^0.18.1
  flutter_localizations:
    sdk: flutter
  webview_flutter: ^4.2.1
  collection: ^1.17.0
  flutter_local_notifications: ^13.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/feeds.json
